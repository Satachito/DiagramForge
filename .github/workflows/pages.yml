name: Deploy GitHub Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  deploy:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - uses: actions/checkout@v6

      - name: Prepare site
        run: |
          mkdir -p _site
          cp -rL Web/. _site/
          # Web/*.zip are gitignored symlinks (absent in CI), so copy the real
          # icon archives from ICONs/ to the paths the app fetches (bare names).
          cp ICONs/*.zip _site/
          touch _site/.nojekyll

      - uses: actions/upload-pages-artifact@v5
        with:
          path: _site

      - id: deployment
        uses: actions/deploy-pages@v5
